on:
  push:
    branches:
    - main

jobs:
  my_job:
    name: Sudarshan GitHubAction Pipeline on push command
    runs-on: ubuntu-22.04
    steps:
      - name: Azure Login
        uses: Azure/login@v3
        with:
            client-id: ${{ secrets.AZURE_CLIENT_ID }}
            tenant-id: ${{ secrets.AZURE_TENANT_ID }}
            subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
